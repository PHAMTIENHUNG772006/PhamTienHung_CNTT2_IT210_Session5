<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"> <head>
    <title>Thực đơn nhà hàng - Bài 5</title>
</head>
<body>

<div layout:fragment="content"> <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${errorMessage}">Lỗi mặc định (Designer thấy)</span>
    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Thực đơn món ăn (Bài 5)</h2>
        <span class="badge badge-info">Phiên bản Natural Templating</span>
    </div>

    <table class="table table-hover shadow-sm">
        <thead class="thead-dark">
        <tr>
            <th>ID</th>
            <th>Tên món</th>
            <th>Giá gốc</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${dishes}">
            <td th:text="${p.id}">1</td>
            <td th:text="${p.name}">Phở Bò Mẫu</td>
            <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">30,000</td>
            <td>
                    <span
                          th:text="${p.isAvailable ? 'Còn hàng' : 'Hết hàng'}">
                        Sẵn sàng
                    </span>
            </td>
            <td>
                <a th:href="@{|/bai5/view/${p.id}|}" class="btn btn-sm btn-primary">Đặt món</a>
            </td>
        </tr>

        <tr th:remove="all">
            <td>2</td>
            <td>Bún Chả Designer</td>
            <td>35,000</td>
            <td>Còn hàng</td>
            <td><button class="btn btn-sm btn-primary">Đặt món</button></td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(dishes)}" class="alert alert-warning text-center">
        Hiện tại nhà hàng chưa có món ăn nào phù hợp.
    </div>
</div>

</body>
</html>
